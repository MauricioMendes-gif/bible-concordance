name: Gerar Concordância Bíblica
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: |
          [ -f bible_acf.json ] || curl -L -o bible_acf.json https://raw.githubusercontent.com/thiagobodruk/biblia/master/json/acf.json
          python scripts/build_concordance.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/concordance/ || true
          git commit -m "🤖 auto: gerar índice" || true
          git push
