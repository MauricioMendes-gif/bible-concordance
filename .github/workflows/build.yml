name: Gerar Concordância Bíblica
on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/build_concordance.py'
      - 'bible_*.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Baixar ARC se não existir
        run: |
          [ -f bible_acf.json ] || curl -L -o bible_acf.json https://raw.githubusercontent.com/thiagobodruk/biblia/master/json/acf.json
          [ -f bible_arc.json ] || curl -L -o bible_arc.json https://raw.githubusercontent.com/thiagobodruk/biblia/master/json/arc.json

      - name: Gerar índices (ACF + ARC)
        run: python scripts/build_concordance.py

      - name: Commitar e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 auto: atualizar concordância (ACF+ARC)" && git push)
