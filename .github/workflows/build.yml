name: Gerar Concordância Bíblica
on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/build_concordance.py'
      - 'bible_acf.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ✅ Permite push automático
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # ✅ Usa token com permissão

      - name: Configurar Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Baixar Bíblia (se não existir)
        run: |
          [ -f bible_acf.json ] || curl -L -o bible_acf.json https://raw.githubusercontent.com/thiagobodruk/biblia/master/json/acf.json

      - name: Gerar índice da concordância
        run: python scripts/build_concordance.py

      - name: Commitar e push automático
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/concordance/
          if ! git diff --quiet; then
            git commit -m "🤖 auto: atualizar índice da concordância"
            git push
          else
            echo "✅ Sem alterações para commitar"
          fi
